# ralphi configuration
# Auto-generated — edit as needed

project:
  name: "pi-inline-format"
  language: "TypeScript + Rust"

commands:
  check: "npm run check"
  lint: "npm run lint"
  typecheck: "npm run typecheck"
  rust_lint: "npm run rust:lint"
  rust_test: "npm run rust:test"

rules:
  - "read files and gather evidence before editing"
  - "keep the TypeScript layer thin and Pi-facing"
  - "put parsing and performance-sensitive logic in the Rust core"
  - "keep lint policy centralized in config files rather than file-level overrides"
  - "treat unused code as an error in both TypeScript and Rust"

loop:
  guidance: "This repo's core feature is successful only when the normal Pi user flow preserves the standard Pi/bash transcript rendering exactly for the canonical prompt \"Use bash to write python to a file using heredocs. Execute into /tmp/delete.me.py\", with one exception: apply normal Python syntax highlighting only to the heredoc body lines between <<'PY' and PY. Do not add labels, duplicate blocks, explanatory text, or visible wrapper/body splits. Preserve all original transcript text, bounding boxes, padding, margins, and surrounding colors. Do not recolor surrounding bash lines or heredoc delimiter lines. A story passes only when a real Pi tmux session with the extension loaded shows output matching normal Pi layout and text, except for inline Python syntax coloring inside the heredoc body."
  reviewPasses: 2
  trajectoryGuard: "require_corrective_plan"
  reflectEvery: 1
  reflectInstructions: "Reassess whether the current implementation proves real Pi rendering success, not just parser, CLI, or helper-command success.\\\\nIf visual or color-preserving proof is still missing, treat the iteration as incomplete and plan the smallest next step that obtains that proof."
boundaries:
  never_touch:
    - "*.lock"
    - ".env*"

engine: "pi"
max_retries: 3
