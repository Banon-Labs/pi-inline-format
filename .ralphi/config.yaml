# ralphi configuration
# Auto-generated — edit as needed

project:
  name: "pi-inline-format"
  language: "TypeScript + Rust"

commands:
  check: "npm run check"
  lint: "npm run lint"
  typecheck: "npm run typecheck"
  rust_lint: "npm run rust:lint"
  rust_test: "npm run rust:test"

rules:
  - "read files and gather evidence before editing"
  - "keep the TypeScript layer thin and Pi-facing"
  - "put parsing and performance-sensitive logic in the Rust core"
  - "keep lint policy centralized in config files rather than file-level overrides"
  - "treat unused code as an error in both TypeScript and Rust"

loop:
  guidance: "This repo's core feature is successful only when the normal Pi user flow renders bash-heredoc transcripts with distinct embedded Python output, not only when helper commands or parser output work. Passing npm run check is necessary but not sufficient. A rendering    story passes only if the canonical prompt \"Use bash to write python to a file using heredocs. Execute into /tmp/delete.me.py\" is validated in a real Pi tmux session with the extension loaded, produces distinct wrapper-versus-embedded output in the normal flow, and generates a color-preserving  artifact that can be reviewed. Treat the artifact as PASS only when it shows: 1. the normal user flow triggered the rendering path, 2. wrapper bash and embedded python are visibly separated, 3. the embedded python block is rendered as python rather than plain shell text, 4. the artifact        preserves ANSI or equivalent color information, and 5. at least two visually distinct syntax token styles are present inside the embedded python block, with visible distinction from the surrounding bash wrapper. Do not mark a story done if proof exists only through /inline-format-render,       custom tools, parser JSON, or non-visual logs."
  reviewPasses: 2
  trajectoryGuard: "require_corrective_plan"
  reflectEvery: 1
  reflectInstructions: "Reassess whether the current implementation proves real Pi rendering success, not just parser, CLI, or helper-command success.\\nIf visual or color-preserving proof is still missing, treat the iteration as incomplete and plan the smallest next step that obtains that proof."
boundaries:
  never_touch:
    - "*.lock"
    - ".env*"

engine: "pi"
max_retries: 3
