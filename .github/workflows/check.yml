name: check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: node ./scripts/run-npm-command-without-warnings.mjs ci

      - name: Materialize local sibling host source for migration rehearsal
        run: |
          git clone https://github.com/Banon-Labs/pi-inline-format-extensions.git ../pi-inline-format-extensions
          git -C ../pi-inline-format-extensions checkout v0.1.5
          node ./scripts/run-npm-command-without-warnings.mjs --prefix ../pi-inline-format-extensions ci

      - name: Rehearse host-source upgrade path
        run: npm run verify:host-source-upgrade-path

      - name: Run pinned host regression
        run: npm run check:pinned-host-runtime

      - name: Run ANSI capture proof harness
        run: npm run check:ansi-capture-proof

      - name: Run core quality gates
        run: npm run check:core
