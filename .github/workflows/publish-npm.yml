name: Publish npm package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Show toolchain versions
        run: node --version && npm --version

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: node ./scripts/run-npm-command-without-warnings.mjs ci

      - name: Materialize released sibling host source for migration rehearsal
        run: |
          git clone https://github.com/Banon-Labs/pi-inline-format-extensions.git ../pi-inline-format-extensions
          git -C ../pi-inline-format-extensions checkout v0.1.5
          node ./scripts/run-npm-command-without-warnings.mjs --prefix ../pi-inline-format-extensions ci

      - name: Run validation
        run: npm run check

      - name: Publish to npm
        run: npm publish --provenance --access public
