name: Publish npm package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Materialize local sibling host source for migration rehearsal
        run: |
          git clone https://github.com/Banon-Labs/pi-inline-format-extensions.git ../pi-inline-format-extensions
          git -C ../pi-inline-format-extensions checkout 3940ceef96e80aee3f44ef7cdcf0007220521b70
          npm ci --prefix ../pi-inline-format-extensions

      - name: Run validation
        run: npm run check

      - name: Publish to npm
        run: npm publish --provenance --access public
